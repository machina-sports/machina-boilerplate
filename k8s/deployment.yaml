apiVersion: apps/v1
kind: Deployment
metadata:
  name: machina-frontend-boilerplate
  labels:
    app: machina-frontend-boilerplate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: machina-frontend-boilerplate
  template:
    metadata:
      labels:
        app: machina-frontend-boilerplate
    spec:
      containers:
        - name: machina-frontend-boilerplate
          image: mateuspinheiro/machina-frontend-boilerplate:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: "production"

